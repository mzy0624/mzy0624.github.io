<p>Co-training（协同训练）是一种半监督学习技术，需要两种数据视图，它假设每个示例都使用两组不同的特征来描述，这两组特征提供了关于示例的补充信息。理想情况下，这两个视图是有条件独立的（即在给定类的情况下，每个示例的两个特征集是有条件的独立的），每个视图都是足够的（即仅从每个视图就可以准确地预测示例的类）。</p>
<p>Krogel 和 Scheffer 表明，只有当数据集之间是独立的时候（即当一个模型正确地标记了另一个模型之前误标的数据），Co-Training 才是有用的。如果模型对所有未标记的数据都达成一致，即它们之间相互依赖，那么标记数据并不会产生新的信息。</p>
