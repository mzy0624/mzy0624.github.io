    <body>
        <div id="masthead" class="masthead"></div>

        <style>
            .code-container {
                position: relative;
                background-color: #f5f5f5;
                border: 1px solid #ddd;
                border-radius: 4px;
                padding: 0.5em;
                margin: 1em 0;
                overflow: auto;
                font-size: 0.95em; /* 代码块字体大小略微小于正常文字 */
            }

            .code-container pre {
                margin: 0;
                font-family: Consolas, "Courier New", monospace;
                white-space: pre;
                overflow-x: auto;
            }

            .copy-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                background-color: #007bff;
                color: white;
                border: none;
                padding: 0.2em 0.5em;
                border-radius: 3px;
                cursor: pointer;
                font-size: 0.75em; /* 复制按钮的字体大小 */
            }

            .copy-btn:hover {
                background-color: #0056b3;
            }

        </style>

            <article class="page" id="page">
