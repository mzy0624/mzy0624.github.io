<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination Example</title>
    <style>
        .container {
            display: none;
        }
        .active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="divContainer">
        <!-- 这里是若干个 div 元素 -->
        <div class="container">Content 1</div>
        <div class="container">Content 2</div>
        <div class="container">Content 3</div>
        <div class="container">Content 4</div>
        <div class="container">Content 5</div>
        <div class="container">Content 6</div>
        <div class="container">Content 7</div>
        <div class="container">Content 8</div>
        <div class="container">Content 9</div>
        <div class="container">Content 10</div>
        <!-- 根据需求添加更多的 div -->
    </div>

    <div>
        <button onclick="showPage(1)">首页</button>
        <button onclick="prevPage()">上一页</button>
        <button onclick="nextPage()">下一页</button>
        <button onclick="showPage(totalPages)">末页</button>
        <input type="number" id="pageNumber" min="1" onchange="showPage(parseInt(this.value))">
        <button onclick="showPage(parseInt(document.getElementById('pageNumber').value))">跳转</button>
    </div>

    <div id="pageInfo">第 1 页 / 共 2 页</div>

    <script>
        const containers = document.querySelectorAll('.container');
        const totalPages = Math.ceil(containers.length / 5);
        let currentPage = 1;

        function showPage(page) {
            // 检查页码是否在有效范围内
            if (page < 1) page = 1;
            if (page > totalPages) page = totalPages;

            // 隐藏所有 div 元素
            containers.forEach((container) => container.classList.remove('active'));

            // 显示当前页的 div 元素
            const start = (page - 1) * 5;
            const end = start + 5;
            for (let i = start; i < end && i < containers.length; i++) {
                containers[i].classList.add('active');
            }

            // 更新输入框的值
            document.getElementById('pageNumber').value = page;
            currentPage = page;

            // 更新页面信息
            document.getElementById('pageInfo').innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
        }

        function prevPage() {
            if (currentPage > 1) {
                showPage(currentPage - 1);
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                showPage(currentPage + 1);
            }
        }

        // 默认显示第一页
        showPage(1);
    </script>
</body>
</html>
